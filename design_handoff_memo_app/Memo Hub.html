<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Memo — Desktop Hub</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css"
/>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #E9E9E6;
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #15151A;
  }
  *, *::before, *::after { box-sizing: border-box; }

  /* design-canvas section heading polish */
  .dc-section-title { font-family: 'Pretendard Variable', sans-serif !important; letter-spacing: -0.01em; }

  /* desk surface inside artboards */
  .desk-light {
    width: 100%; height: 100%;
    background:
      radial-gradient(120% 80% at 30% 0%, #F1F1EE 0%, #E2E2DE 60%, #D6D6D2 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .desk-dark {
    width: 100%; height: 100%;
    background:
      radial-gradient(120% 80% at 30% 0%, #1C1C1F 0%, #131316 60%, #0A0A0C 100%);
    display: flex; align-items: center; justify-content: center;
  }
  /* faint grid texture on the desk */
  .desk-light::before, .desk-dark::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
    background-size: 32px 32px;
    mix-blend-mode: multiply;
    opacity: 0.4;
  }
  .desk-dark::before {
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    mix-blend-mode: screen;
    opacity: 0.5;
  }
  .desk-shell {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="memo-app.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { MemoWindow } = window;

  function DeskLight({ children }) {
    return (
      <div className="desk-shell">
        <div className="desk-light">{children}</div>
      </div>
    );
  }
  function DeskDark({ children }) {
    return (
      <div className="desk-shell">
        <div className="desk-dark">{children}</div>
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas title="Memo — Desktop Hub" subtitle="Light & dark variants · Pretendard · achromatic">
        <DCSection id="primary" title="Primary window">
          <DCArtboard id="light-default" label="Light · default" width={520} height={680}>
            <DeskLight>
              <MemoWindow theme="light" width={400} height={600} />
            </DeskLight>
          </DCArtboard>
          <DCArtboard id="dark-default" label="Dark · default" width={520} height={680}>
            <DeskDark>
              <MemoWindow theme="dark" width={400} height={600} />
            </DeskDark>
          </DCArtboard>
        </DCSection>

        <DCSection id="states" title="States">
          <DCArtboard id="light-search" label="Light · searching" width={520} height={680}>
            <DeskLight>
              <MemoWindow theme="light" width={400} height={600} initialQuery="moon" />
            </DeskLight>
          </DCArtboard>
          <DCArtboard id="dark-search" label="Dark · searching" width={520} height={680}>
            <DeskDark>
              <MemoWindow theme="dark" width={400} height={600} initialQuery="work" />
            </DeskDark>
          </DCArtboard>
          <DCArtboard id="light-empty" label="Light · empty result" width={520} height={680}>
            <DeskLight>
              <MemoWindow theme="light" width={400} height={600} initialQuery="zzzzz" />
            </DeskLight>
          </DCArtboard>
        </DCSection>

        <DCSection id="compact" title="Compact width">
          <DCArtboard id="light-compact" label="Light · 340w" width={460} height={680}>
            <DeskLight>
              <MemoWindow theme="light" width={340} height={600} />
            </DeskLight>
          </DCArtboard>
          <DCArtboard id="dark-compact" label="Dark · 340w" width={460} height={680}>
            <DeskDark>
              <MemoWindow theme="dark" width={340} height={600} />
            </DeskDark>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
